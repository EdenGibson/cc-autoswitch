[mypy]
# Lenient type checking for a pragmatic, stdlib-only CLI.
# Goal: catch obvious mistakes without forcing full annotation coverage.
python_version = 3.11

# Don't fail on third-party / stubless imports.
ignore_missing_imports = True

# Stay out of the way on un-annotated code: no strict mode, and don't
# descend into the bodies of untyped functions.
check_untyped_defs = False
disallow_untyped_defs = False
disallow_incomplete_defs = False
disallow_untyped_calls = False
warn_return_any = False
warn_unused_ignores = False
no_implicit_optional = False

# Quieter, friendlier output.
warn_no_return = False
show_error_codes = True
pretty = True
